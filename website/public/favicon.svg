<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c73650"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Stamp border effect -->
  <rect x="32" y="32" width="448" height="448" rx="72" ry="72" fill="none" stroke="url(#accent)" stroke-width="8" stroke-dasharray="20 12"/>
  <!-- Letter B -->
  <text x="138" y="370" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="320" fill="url(#accent)" letter-spacing="-20">B</text>
  <!-- Stylized stamp tick/checkmark -->
  <path d="M340 180 L370 220 L420 150" fill="none" stroke="#e94560" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
